name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SHOPIFY_ADMIN_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}
      SHOPIFY_STOREFRONT_ACCESS_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_ACCESS_TOKEN }}
      SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}

    steps:
      - uses: actions/checkout@v5

      - name: Check secrets loaded
        run: |
          if [ -n "${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}" ]; then echo "ADMIN OK"; else echo "FALTA SHOPIFY_ADMIN_ACCESS_TOKEN"; fi
          if [ -n "${{ secrets.SHOPIFY_STOREFRONT_ACCESS_TOKEN }}" ]; then echo "STOREFRONT OK"; else echo "FALTA SHOPIFY_STOREFRONT_ACCESS_TOKEN"; fi
          if [ -n "${{ secrets.SHOPIFY_SHOP_DOMAIN }}" ]; then echo "DOMAIN OK"; else echo "FALTA SHOPIFY_SHOP_DOMAIN"; fi
