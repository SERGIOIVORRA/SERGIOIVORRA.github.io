name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SHOPIFY_ADMIN_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}
      SHOPIFY_STOREFRONT_ACCESS_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_ACCESS_TOKEN }}
      SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - name: Check secrets loaded
        run: |
          [ -n "$SHOPIFY_ADMIN_ACCESS_TOKEN" ] && echo "ADMIN OK"
          [ -n "$SHOPIFY_STOREFRONT_ACCESS_TOKEN" ] && echo "STOREFRONT OK"
          [ -n "$SHOPIFY_SHOP_DOMAIN" ] && echo "DOMAIN OK"
